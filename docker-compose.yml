services:
  app:
    build: .
    container_name: bifriends-be
    ports:
      - "18080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bifriends
      DB_USERNAME: bifriends
      DB_PASSWORD: bifriends
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_AUTH_ENABLED: ${INTERNAL_SERVICE_AUTH_ENABLED:-true}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      AI_SERVICE_ENABLED: ${AI_SERVICE_ENABLED:-true}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://bifriends-ai:8001}
      AI_CHAT_PATH: ${AI_CHAT_PATH:-/api/v1/ai/chat}
      FIREBASE_CONFIG_PATH: /app/config/firebase-service-account.json
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-bifriends-5df72.firebasestorage.app}
      FIRESTORE_DATABASE_ID: ${FIRESTORE_DATABASE_ID:-bifriends}
    volumes:
      - ./src/main/resources/firebase-service-account.json:/app/config/firebase-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: bifriends-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: bifriends
      POSTGRES_USER: bifriends
      POSTGRES_PASSWORD: bifriends
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bifriends"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: bifriends-be_default

