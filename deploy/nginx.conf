server {
    listen 443 ssl;
    server_name api.bifriends.study;
    ssl_certificate     /etc/letsencrypt/live/api.bifriends.study/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bifriends.study/privkey.pem;
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
server {
    listen 80;
    server_name api.bifriends.study bifriends.study;
    return 301 https://$host$request_uri;
}
