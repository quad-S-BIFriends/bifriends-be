# AI 서비스 → BE 내부 호출 (Docker 내부망). JWT 대신 X-Internal-Service 헤더.
internal:
  service:
    enabled: ${INTERNAL_SERVICE_AUTH_ENABLED:true}
    header-name: X-Internal-Service
    expected-value: ${INTERNAL_SERVICE_TOKEN:bifriends-ai}

# BE → AI (Docker: http://bifriends-ai:8001 등)
ai:
  service:
    enabled: ${AI_SERVICE_ENABLED:false}
    base-url: ${AI_SERVICE_BASE_URL:http://bifriends-ai:8001}
    chat-path: ${AI_CHAT_PATH:/v1/ai/chat}
    batch-weekly-safety-path: ${AI_BATCH_WEEKLY_SAFETY_PATH:/api/v1/ai/batch/weekly-safety}
    batch-weekly-report-path: ${AI_BATCH_WEEKLY_REPORT_PATH:/api/v1/ai/report/weekly}
    emotion-scenario-path: ${AI_EMOTION_SCENARIO_PATH:/api/v1/ai/content/scenario}