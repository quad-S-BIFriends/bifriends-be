spring:
  application:
    name: bifriends-be

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:bifriends}
    username: ${DB_USERNAME:bifriends}
    password: ${DB_PASSWORD:bifriends}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  sql:
    init:
      mode: always
      data-locations: classpath:db/math_seed.sql,classpath:db/korean_seed.sql,classpath:db/shop_seed.sql

server:
  port: 8080
  tomcat:
    accesslog:
      enabled: true
      pattern: "%t %m %U%q %s"

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256Bits!!}
  access-token-expiration: 3600000    # 1시간
  refresh-token-expiration: 604800000 # 7일

firebase:
  config:
    path: ${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}
  storage:
    bucket: ${FIREBASE_STORAGE_BUCKET:bifriends-5df72.firebasestorage.app}
  # 친구랑 탭 폴백 이미지 다운로드 토큰
  # 파일 경로: fallback/{감정명}/{step}.png (step3는 step3-1.png, step3-2.png, step3-3.png)
  # 키 형식:  {romanized}-{step}  (예: gomaeum-step1, gomaeum-step3-1)
  # 환경변수: FALLBACK_TOKEN_{ROMANIZED}_{STEP}  (예: FALLBACK_TOKEN_GOMAEUM_STEP1)
