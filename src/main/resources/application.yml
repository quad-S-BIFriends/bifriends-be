spring:
  application:
    name: bifriends-be

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bifriends}
    username: ${DB_USERNAME:bifriends}
    password: ${DB_PASSWORD:bifriends}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  sql:
    init:
      mode: always
      data-locations: classpath:db/math_seed.sql,classpath:db/korean_seed.sql,classpath:db/shop_seed.sql

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256Bits!!}
  access-token-expiration: 3600000    # 1시간
  refresh-token-expiration: 604800000 # 7일

firebase:
  config:
    path: ${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}

# AI 서비스 → BE 내부 호출 (Docker 내부망). JWT 대신 X-Internal-Service 헤더.
internal:
  service:
    enabled: ${INTERNAL_SERVICE_AUTH_ENABLED:true}
    header-name: X-Internal-Service
    expected-value: ${INTERNAL_SERVICE_TOKEN:bifriends-ai}

# BE → AI (Docker: http://bifriends-ai:8000 등)
ai:
  service:
    enabled: ${AI_SERVICE_ENABLED:false}
    base-url: ${AI_SERVICE_BASE_URL:http://bifriends-ai:8000}
    chat-path: ${AI_CHAT_PATH:/v1/chat}
    batch-weekly-safety-path: ${AI_BATCH_WEEKLY_SAFETY_PATH:/api/v1/ai/batch/weekly-safety}