spring:
  application:
    name: bifriends-be-chat-pool-test

  datasource:
    url: jdbc:h2:mem:chatpooltest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 5
      connection-timeout: 5000
      pool-name: ChatPoolTest
      register-mbeans: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  sql:
    init:
      mode: never

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

ai:
  service:
    enabled: true

internal:
  service:
    enabled: false

logging:
  level:
    com.zaxxer.hikari: WARN
    org.hibernate: WARN
